name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel

      - name: Test
        run: ctest --test-dir build -C RelWithDebInfo --output-on-failure

      - name: Package
        run: cmake --build build --config RelWithDebInfo --target package

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: HollowDetect-RelWithDebInfo
          path: build/*.zip
